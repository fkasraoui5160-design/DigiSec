    <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horodatage de Fichier</title>
    <style>
        /* Réinitialisation des marges et des bordures */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            color: #007BFF;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            color: #555;
        }

        #fileInput {
            display: block;
            margin: 20px auto;
            padding: 30px;
            font-size: 1rem;
            border-radius: 90px;
            border: 1px solid #ddd;
            background-color: #fff;
            cursor: pointer;
            width: 1000px;
        }

        #fileInput:hover {
            border-color: #007BFF;
        }

        #output {
            margin-top: 20px;
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            border: 1px solid #ddd;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        #output p {
            font-size: 1.1rem;
            color: #333;
        }

        #output em {
            color: #999;
        }
    </style>
</head>
<body>

    <h1>Horodatage de Fichier</h1>

    <h2>Obtenir les Métadonnées d'un Fichier</h2>
    <p>Sélectionnez un fichier pour voir sa date de création et de modification :</p>    

    <input type="file" id="fileInput">
    <div id="output"></div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const output = document.getElementById('output');

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];

            if (file) {
                // Afficher le nom du fichier
                let result = `<p><strong>Nom du fichier :</strong> ${file.name}</p>`;
                
                // Afficher la taille du fichier
                result += `<p><strong>Taille du fichier :</strong> ${(file.size / 1024).toFixed(2)} Ko</p>`;
                
                // Afficher la date de dernière modification
                const modificationDate = new Date(file.lastModified);
                result += `<p><strong>Date de dernière modification :</strong> ${modificationDate.toLocaleString()}</p>`;
                
               
                
                output.innerHTML = result;
            } else {
                output.innerHTML = "<p>Aucun fichier sélectionné.</p>";
            }
        });
    </script>

</body>
