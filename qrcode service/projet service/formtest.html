    <!DOCTYPE html>
    <html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Secure QR Code Generator</title>
    </head>
    <body>
        <div class="container">
            <h1>Secure QR Code Generator</h1>
            
            <div class="form-group">
                <label for="inputPlainText">Enter your text here:</label>
                <textarea id="inputPlainText" rows="4"></textarea>
            </div>
    
            <div class="form-group">
                <button onclick="generateEncryptionKey()">Generate Encryption Key</button>
                <input type="text" id="inputEncryptionKey" placeholder="Encryption Key">
            </div>
    
            <div class="form-group">
                <button onclick="generateQRCodeFromText()">Generate QR Code</button>
            </div>
    
            <!-- QR Code Section -->
            <div id="qrcodeContainer" style="margin-top: 20px;"></div>
        </div>
    
        <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.0.0/crypto-js.min.js"></script>
        <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
        <script>
            function generateEncryptionKey() {
                const key = CryptoJS.lib.WordArray.random(16).toString();
                document.getElementById('inputEncryptionKey').value = key;
            }
    
            function generateQRCodeFromText() {
                const key = document.getElementById('inputEncryptionKey').value;
                if (!key) {
                    alert('Please generate an encryption key first.');
                    return;
                }
    
                const plainText = document.getElementById('inputPlainText').value;
                if (!plainText) {
                    alert('Please enter text to encrypt.');
                    return;
                }
    
                // Encrypt the plaintext using the encryption key
                const encryptedText = CryptoJS.AES.encrypt(plainText, key).toString();
    
                // Generate QR Code for the encrypted text (no display of encrypted text in the field)
                generateQRCode(encryptedText);
            }
    
            // Function to generate QR Code for encrypted text
            function generateQRCode(encryptedText) {
                const qrcodeElement = document.getElementById('qrcodeContainer');
                qrcodeElement.innerHTML = '';  // Clear previous QR Code
                new QRCode(qrcodeElement, {
                    text: encryptedText,
                    width: 128,
                    height: 128,
                    colorDark: "#007BFF",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            }
        </script>
    </body>
