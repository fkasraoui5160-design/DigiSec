<body>
    <div class="container">
        <h1>Service de Hashage SHA-256</h1>
        <p>Entrez un texte ou téléchargez un fichier pour obtenir son hash en SHA-256.</p>
        
        <hr>

        <!-- Formulaire de hashage de texte -->
        <form id="text-form">
            <div class="input-group">
                <label for="hash_input">Texte à hasher :</label>
                <input type="text" id="hash_input" name="hash_input" placeholder="Saisir du texte" required>
            </div>
            <div class="input-group">
                <input type="submit" value="Hasher le texte">
            </div>
        </form>

        <div id="text-result" class="hash-result" style="display: none;">
            <p><strong>Hash SHA-256 du texte :</strong></p>
            <p id="hashed-text"></p>
        </div>

        <hr>

        <!-- Formulaire de hashage de fichier -->
        <form id="file-form" enctype="multipart/form-data">
            <div class="input-group">
                <label for="file_input">Sélectionner un fichier :</label>
                <input type="file" id="file_input" name="file_input" accept=".pdf,.jpg,.jpeg,.png,.gif" required>
            </div>
            <div class="input-group">
                <input type="submit" value="Hasher le fichier">
            </div>
        </form>

        <div id="file-result" class="hash-result" style="display: none;">
            <p><strong>Hash SHA-256 du fichier :</strong></p>
            <p id="hashed-file"></p>
        </div>

        <hr>
    </div>

   

    <script>
        // Fonction pour hasher le texte en SHA-256
        async function hashText(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(byte => byte.toString(16).padStart(2, '0')).join('');
        }

        // Fonction pour hasher le fichier en SHA-256
        async function hashFile(file) {
            const arrayBuffer = await file.arrayBuffer();
            const hashBuffer = await crypto.subtle.digest('SHA-256', arrayBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(byte => byte.toString(16).padStart(2, '0')).join('');
        }

        // Hashage du texte
        document.getElementById('text-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const inputText = document.getElementById('hash_input').value;
            const hashedText = await hashText(inputText);
            document.getElementById('hashed-text').innerText = hashedText;
            document.getElementById('text-result').style.display = 'block';
        });

        // Hashage du fichier
        document.getElementById('file-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = document.getElementById('file_input').files[0];
            const hashedFile = await hashFile(file);
            document.getElementById('hashed-file').innerText = hashedFile;
            document.getElementById('file-result').style.display = 'block';
        });
    </script>
