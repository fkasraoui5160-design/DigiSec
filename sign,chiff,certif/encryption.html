  <div class="container">
  <h1 class="text-center mb-4" style="color: blue; font-weight: bold; font-style: italic;">Secure File Service</h1>
    <!-- Texte ou description avant le formulaire -->
    <p class="text-center mb-3" style="color: blue;">Service de chiffrement : Protégez vos fichiers en toute sécurité.</p>


    <form>
      <!-- Mode Selection -->
      <div class="mb-3">
        <label class="form-label">Sélection du mode</label>
        <div class="form-check">
          <input type="radio" id="fileMode" name="mode" class="form-check-input" value="file" checked>
          <label for="fileMode" class="form-check-label">Fichier</label>
        </div>
        <div class="form-check">
          <input type="radio" id="textMode" name="mode" class="form-check-input" value="text">
          <label for="textMode" class="form-check-label">Texte</label>
        </div>
      </div>

      <!-- File Input (For file mode) -->
      <div class="mb-3" id="fileInputContainer">
        <label for="fileInput" class="form-label">Sélectionnez un fichier à chiffrer</label>
        <input type="file" id="fileInput" class="form-control">
      </div>

      <!-- Text Input (For text mode) -->
      <div class="mb-3 text-container" id="textInputContainer">
        <label for="textInput" class="form-label">Entrez le texte à chiffrer</label>
        <textarea id="textInput" class="form-control" rows="5"></textarea>
      </div>

      <!-- Password Input -->
      <div class="mb-3">
        <label for="password" class="form-label">Mot de passe</label>
        <input type="password" id="password" class="form-control" placeholder="Entrez le mot de passe">
      </div>
      <div class="mb-3">
        <label for="confirmPassword" class="form-label">Confirmez le mot de passe</label>
        <input type="password" id="confirmPassword" class="form-control" placeholder="Entrez le mot de passe à nouveau">
      </div>

      <!-- Action Button -->
      <button type="button" class="btn btn-primary" id="actionButton">Chiffrement</button>
    </form>

    <!-- Download Link -->
    <a id="downloadLink" class="btn btn-success mt-3" style="display: none;">Télécharger le fichier chiffré</a>
    <pre id="resultText" class="mt-3" style="display: none;"></pre>
  </div>

  <script>
    const actionButton = document.getElementById('actionButton');
    const fileMode = document.getElementById('fileMode');
    const textMode = document.getElementById('textMode');
    const fileInputContainer = document.getElementById('fileInputContainer');
    const textInputContainer = document.getElementById('textInputContainer');
    const downloadLink = document.getElementById('downloadLink');
    const resultText = document.getElementById('resultText');

    // Toggle between file and text modes
    fileMode.addEventListener('change', () => {
      fileInputContainer.style.display = 'block';
      textInputContainer.style.display = 'none';
    });
    textMode.addEventListener('change', () => {
      fileInputContainer.style.display = 'none';
      textInputContainer.style.display = 'block';
    });

    actionButton.addEventListener('click', async () => {
      const mode = fileMode.checked ? 'file' : 'text';
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!password || password !== confirmPassword) {
        alert('Les mots de passe ne correspondent pas ou sont vides.');
        return;
      }

      let resultContent;
      let resultFileName;

      if (mode === 'file') {
        if (!fileInput.files.length) {
          alert('Veuillez sélectionner un fichier.');
          return;
        }

        const file = fileInput.files[0];
        const arrayBuffer = await file.arrayBuffer();
        const fileContent = new Uint8Array(arrayBuffer);

        try {
          // Chiffrement avec AES
          const wordArray = CryptoJS.lib.WordArray.create(fileContent);
          const encrypted = CryptoJS.AES.encrypt(wordArray, password).toString();
          resultContent = new Blob([encrypted], { type: 'application/octet-stream' });
          resultFileName = `${file.name}.encrypted`;
        } catch (e) {
          alert('Erreur lors du chiffrement. Vérifiez le mot de passe ou le fichier.');
          return;
        }

        // Créer le lien de téléchargement
        const url = URL.createObjectURL(resultContent);
        downloadLink.href = url;
        downloadLink.download = resultFileName;
        downloadLink.style.display = 'block';
        downloadLink.textContent = 'Télécharger le fichier chiffré';
        resultText.style.display = 'none';
      } else {
        const text = document.getElementById('textInput').value;

        if (!text) {
          alert('Veuillez entrer du texte.');
          return;
        }

        try {
          // Chiffrement avec AES
          const encrypted = CryptoJS.AES.encrypt(text, password).toString();
          resultText.textContent = encrypted;
          resultText.style.display = 'block';
          downloadLink.style.display = 'none';
        } catch (e) {
          alert('Erreur lors du chiffrement du texte. Vérifiez le mot de passe.');
          return;
        }
      }
    });
  </script>
